[tox]
envlist = py38, py39, py310, py311, py312, py313, lint, type

[testenv]
deps =
    pytest
    pytest-cov
    pytest-asyncio
commands =
    pytest {posargs}

[testenv:lint]
deps =
    black
    isort
    flake8
    pylint
commands =
    black --check --diff localportmanager.py tests/
    isort --check --diff localportmanager.py tests/
    flake8 localportmanager.py tests/
    pylint localportmanager.py

[testenv:type]
deps =
    mypy
commands =
    mypy localportmanager.py

[testenv:coverage]
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=localportmanager --cov-report=html --cov-report=xml --cov-fail-under=80

[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,.tox,.venv,venv
ignore = E203,W503
